name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  build-on-push:
    name: Build image on push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        run: docker build -t baskarp04/apache-httpd-web:latest .

      - name: Push docker image
        run: docker push baskarp04/apache-httpd-web:latest

  deploy:
    name: Deploy into ec2 instance
    needs: build-on-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to ec2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull baskarp04/apache-httpd-web:latest

            sudo docker stop apache-web || true
            sudo docker rm apache-web || true

            sudo docker run -d -p 8080:80 --name apache-web baskarp04/apache-httpd-web:latest
    
